<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto Fullstack</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .container {
            margin-top: 100px;
            background: white;
            display: inline-block;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
            font-size: 28px;
        }

        p {
            color: #666;
            font-size: 16px;
        }

        .badge {
            margin-top: 15px;
            display: inline-block;
            padding: 10px 20px;
            background: #4facfe;
            color: white;
            border-radius: 20px;
            font-size: 14px;
        }
    </style>

</head>
<body>

    <div class="container">
        <h1>Bienvenido al entorno colaborativo</h1>

        <p>Proyecto desarrollado con Git y GitHub</p>

        <div class="badge">
            Rama: desarrollo 🚀
        </div>
    </div>

</body>
</html>
